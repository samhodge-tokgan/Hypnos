name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # The export design is verified without MEMatte checkpoints or detectron2:
  # these two tests are what stand behind the "the rewrite is equivalent" and
  # "one graph serves every resolution" claims, so they gate everything else.
  export-design:
    name: Export design (routing equivalence + shape dynamics)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnxruntime numpy
      - name: Routing equivalence vs upstream eval path
        run: python tools/routing_equivalence_test.py
      - name: Resolution dynamics
        run: python tools/shape_dynamics_test.py

  # Linux is built inside an EL8 container, NOT on the ubuntu runner.
  #
  # The VFX Reference Platform baseline is RHEL/Rocky 8: glibc 2.28,
  # GLIBCXX_3.4.25. A binary built on ubuntu-22.04 (let alone 24.04) requires
  # GLIBC_2.33/2.34/2.38 and GLIBCXX_3.4.26+, so it will NOT load in a host on
  # Rocky 8 - which is what most facilities actually run. This shipped broken in
  # v0.1.0 and was caught only by testing on a real Rocky 8 box.
  #
  # Building in manylinux_2_28 with gcc-toolset-12 yields a binary needing only
  # GLIBC_2.27 / GLIBCXX_3.4.21, which runs on Rocky 8 AND on newer distros.
  build-linux:
    name: Build (linux, EL8 / manylinux_2_28)
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          dnf install -y patchelf gcc-toolset-12 cmake git || \
            yum install -y patchelf gcc-toolset-12 cmake git

      - name: Configure and build
        run: |
          source /opt/rh/gcc-toolset-12/enable
          cmake -S . -B build -DHYP_WITH_ONNX=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify EL8 ABI floor
        # The whole point of this job: fail loudly if the binary would not load
        # on Rocky 8. Nothing else in the build or tests catches this.
        run: bash tools/check_el8_abi.sh build/MEMatte.ofx.bundle/Contents/Linux-x86-64/MEMatte.ofx

      - name: Check bundle layout
        run: |
          set -e
          # OFX spec: the arch dir MUST be hyphenated or hosts silently skip it.
          test -f build/MEMatte.ofx.bundle/Contents/Linux-x86-64/MEMatte.ofx
          test -f build/MEMatte.ofx.bundle/Contents/Linux-x86-64/libonnxruntime_hyp.so.1
          SYMS=$(nm -D --defined-only build/MEMatte.ofx.bundle/Contents/Linux-x86-64/MEMatte.ofx \
                 | awk '{print $3}' | grep -v '^_' | sort)
          test "$SYMS" = "$(printf 'OfxGetNumberOfPlugins\nOfxGetPlugin')"
          echo "bundle layout and symbol isolation OK"

      - uses: actions/upload-artifact@v4
        with:
          name: MEMatte-linux-x86_64
          path: build/MEMatte.ofx.bundle

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DHYP_WITH_ONNX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Providers and memory probe
        # Reports which EP is available and what the memory probe measures on
        # this runner. GitHub runners have no GPU, so CPU-only here is expected;
        # the CUDA path is exercised on a self-hosted GPU runner.
        run: |
          ./build/ort_check || ./build/Release/ort_check.exe || true
        shell: bash

      - name: Check bundle layout
        shell: bash
        run: |
          set -e
          BUNDLE=build/MEMatte.ofx.bundle
          test -d "$BUNDLE" || { echo "no bundle"; exit 1; }
          case "${{ runner.os }}" in
            macOS)   ARCH=MacOS;  LIBDIR=Frameworks; LIB=libonnxruntime_hyp.1.dylib;;
            Windows) ARCH=Win64;  LIBDIR=Win64;      LIB=onnxruntime_hyp.dll;;
          esac
          test -f "$BUNDLE/Contents/$ARCH/MEMatte.ofx"
          test -f "$BUNDLE/Contents/$LIBDIR/$LIB"
          echo "bundle layout ok"

      - name: Check symbol isolation (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -e
          BIN=$(find build/MEMatte.ofx.bundle -name 'MEMatte.ofx' -type f | head -1)
          SYMS=$(nm -gU "$BIN" | awk '{print $3}' | sort)
          EXPECT=$(printf '_OfxGetNumberOfPlugins\n_OfxGetPlugin\n')
          # Anything else exported could interpose on the host or a sibling plugin.
          if [ "$SYMS" != "$EXPECT" ]; then
            echo "unexpected exported symbols:"; echo "$SYMS"; exit 1
          fi
          echo "symbol isolation ok"

      - uses: actions/upload-artifact@v4
        with:
          name: MEMatte-${{ matrix.os }}
          path: build/MEMatte.ofx.bundle
